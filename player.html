<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC BOX</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Sora', sans-serif;
        }
        :root {
            --bg-dark: #090611;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            --card-bg: rgba(17, 12, 28, 0.6);
            --card-border: rgba(139, 92, 246, 0.2);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-align: center;
            filter: drop-shadow(0 4px 12px rgba(139, 92, 246, 0.2));
        }
        .player-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 16px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(139, 92, 246, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 680px;
        }
        #player-container {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 18px;
            overflow: hidden;
            background: #000000;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #yt-player {
            width: 100%;
            height: 100%;
            border: none;
        }
        #song-title {
            margin-top: 20px;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            max-width: 620px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }
        .status {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-primary);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.6);
            animation: pulseGlow 1.5s infinite ease-in-out;
        }
        .unlock-overlay {
            position: fixed;
            inset: 0;
            background: rgba(9, 6, 17, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }
        .unlock-card {
            background: rgba(17, 12, 28, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.25);
            padding: 40px;
            border-radius: 28px;
            text-align: center;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .unlock-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            animation: pulseIcon 2s infinite ease-in-out;
        }
        .unlock-title {
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .unlock-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .unlock-btn {
            background: var(--accent-gradient);
            border: none;
            color: #ffffff;
            padding: 14px 28px;
            font-weight: 700;
            border-radius: 14px;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.25);
            transition: all 0.2s ease;
        }
        .unlock-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 24px rgba(236, 72, 153, 0.4);
        }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.3)); }
        }
    </style>
</head>
<body>


    <h1>ComMSP MUsic box</h1>
    <div class="player-card">
        <div id="player-container">
            <div id="yt-player"></div>
        </div>
        <div id="song-title">No music is currently playing</div>
        <div class="status" id="status-text">
            <span class="pulse-dot"></span>
            <span>Waiting for songs in queue...</span>
        </div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var currentVideoId = null;
        var pollInterval = null;
        var autoplayUnlocked = true;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                width: '640',
                height: '360',
                videoId: '',
                playerVars: {
                    'playsinline': 1,
                    'autoplay': 1,
                    'controls': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            console.log("Player Ready");
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                console.log("Song ended. Requesting next song.");
                notifySongEnded();
            }
        }

        function onPlayerError(event) {
            console.error("Player error:", event.data);
            document.getElementById('status-text').innerHTML = 
                "<span style='color: #f59e0b; font-weight: bold;'>⚠️ Failed to play embedded. Switching to main browser...</span>";
            
            fetch('/api/queue/fallback')
                .then(res => res.json())
                .then(data => {
                    console.log("Fallback triggered on server:", data);
                })
                .catch(err => console.error("Error triggering fallback:", err));
        }

        function notifySongEnded() {
            const endedId = currentVideoId || '';
            fetch('/api/queue/next?ended_id=' + encodeURIComponent(endedId))
                .then(res => res.json())
                .then(data => {
                    if (data.status === "ok" && data.current) {
                        playVideo(data.current.id, data.current.title, data.current.embeddable);
                    } else {
                        clearActiveVideo();
                    }
                })
                .catch(err => console.error("Error skipping to next:", err));
        }

        function playVideo(id, title, embeddable) {
            currentVideoId = id;
            document.getElementById('song-title').textContent = title;
            if (embeddable === false) {
                document.getElementById('status-text').innerHTML = 
                    "<span style='color: #ef4444; font-weight: bold; line-height: 1.5; display: inline-block; margin-top: 10px;'>⚠️ Video blocked outside YouTube. Opened in main browser window. Please press 'Skip' when finished.</span>";
                player.stopVideo();
            } else {
                document.getElementById('status-text').textContent = "Playing";
                player.loadVideoById(id);
                if (autoplayUnlocked && player.playVideo) {
                    player.playVideo();
                }
            }
        }

        function clearActiveVideo() {
            currentVideoId = null;
            document.getElementById('song-title').textContent = "No music is currently playing";
            document.getElementById('status-text').textContent = "Waiting for songs in queue...";
            player.stopVideo();
        }

        function handleRemoteAction(action) {
            if (!action || !player) return;
            console.log("Executing remote action: ", action);
            
            if (action === "play") {
                player.playVideo();
            } else if (action === "pause") {
                player.pauseVideo();
            } else if (action === "reload") {
                player.seekTo(0);
                player.playVideo();
            } else if (action === "clear") {
                clearActiveVideo();
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => {
                if (!autoplayUnlocked) return;
                fetch('/api/queue/status?role=player')
                    .then(res => res.json())
                    .then(data => {
                        if (data.current) {
                            if (currentVideoId !== data.current.id) {
                                playVideo(data.current.id, data.current.title, data.current.embeddable);
                            }
                        } else {
                            if (currentVideoId !== null) {
                                clearActiveVideo();
                            }
                        }
                        
                        if (data.action) {
                            handleRemoteAction(data.action);
                        }
                    })
                    .catch(err => console.error("Polling error:", err));
            }, 500);
        }

        startPolling();
    </script>
</body>
</html>
