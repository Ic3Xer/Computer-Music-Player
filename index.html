<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComMSP SPACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Sora', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-dark: #090611;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            --card-bg: rgba(17, 12, 28, 0.6);
            --card-border: rgba(139, 92, 246, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.12) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 440px;
            background: rgba(15, 10, 25, 0.5);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 30px 24px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.6),
                0 0 50px rgba(139, 92, 246, 0.05);
            position: relative;
            overflow: hidden;
        }
        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.08) 0%, transparent 100%);
            pointer-events: none;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }
        .header-info h2 {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            transition: all 0.3s ease;
        }
        .status-dot.active {
            background-color: var(--success);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .action-button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .action-button:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            color: #c084fc;
            transform: translateY(-2px);
        }
        .player-visuals {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
            position: relative;
            z-index: 2;
        }
        .vinyl-wrapper {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            background: radial-gradient(circle, #2d1a4d 0%, #0d081b 100%);
            border: 6px solid rgba(255, 255, 255, 0.02);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 0 30px rgba(139, 92, 246, 0.05);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .vinyl-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent, transparent 3px, rgba(0, 0, 0, 0.4) 3px, rgba(0, 0, 0, 0.4) 6px);
            pointer-events: none;
        }
        .vinyl-wrapper.playing {
            border-color: rgba(139, 92, 246, 0.25);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.7),
                0 0 40px rgba(139, 92, 246, 0.25),
                0 0 80px rgba(236, 72, 153, 0.15);
            animation: spinVinyl 12s linear infinite;
        }
        .vinyl-center {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            box-shadow: 
                inset 0 2px 4px rgba(255, 255, 255, 0.3),
                0 4px 12px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 3;
        }
        .vinyl-center::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--bg-dark);
            border-radius: 50%;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }
        .equalizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 5px;
            height: 28px;
            margin-top: 24px;
            width: 100%;
        }
        .eq-bar {
            width: 4px;
            height: 6px;
            background: var(--accent-gradient);
            border-radius: 2px;
            transition: all 0.2s ease;
            opacity: 0.4;
        }
        .playing .eq-bar {
            animation: dance 1.2s ease-in-out infinite alternate;
            opacity: 1;
        }
        .playing .eq-bar:nth-child(1) { animation-delay: 0.1s; height: 12px; }
        .playing .eq-bar:nth-child(2) { animation-delay: 0.4s; height: 22px; }
        .playing .eq-bar:nth-child(3) { animation-delay: 0.2s; height: 16px; }
        .playing .eq-bar:nth-child(4) { animation-delay: 0.6s; height: 26px; }
        .playing .eq-bar:nth-child(5) { animation-delay: 0.3s; height: 18px; }
        .playing .eq-bar:nth-child(6) { animation-delay: 0.5s; height: 10px; }
        .controls-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .panel {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.3s ease;
        }
        .panel:hover {
            border-color: rgba(139, 92, 246, 0.12);
            background: rgba(19, 14, 32, 0.8);
        }
        .volume-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .panel-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .volume-value-wrapper {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .volume-input-number {
            width: 42px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--text-main);
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 2px;
            outline: none;
        }
        .volume-input-number::-webkit-inner-spin-button,
        .volume-input-number::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .slider-track-container {
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
        }
        .custom-slider {
            width: 100%;
            height: 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            cursor: pointer;
            accent-color: var(--accent-primary);
            transition: all 0.2s ease;
        }
        .custom-slider:hover {
            accent-color: var(--accent-secondary);
        }
        .search-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .search-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.85rem;
            padding: 10px 14px;
            outline: none;
            transition: all 0.25s ease;
        }
        .search-input:focus {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.1);
            background: rgba(0, 0, 0, 0.35);
        }
        .search-input::placeholder {
            color: #6b7280;
        }
        .primary-action-btn {
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .primary-action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(236, 72, 153, 0.3);
        }
        .primary-action-btn:active {
            transform: translateY(1px);
        }
        .secondary-badge-btn {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: #d8b4fe;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 600;
        }
        .secondary-badge-btn:hover {
            background: rgba(139, 92, 246, 0.16);
            border-color: rgba(139, 92, 246, 0.4);
            color: #ffffff;
        }
        .system-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .utility-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 6px;
        }
        .util-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .util-btn svg {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        .util-btn span {
            font-size: 0.65rem;
            font-weight: 600;
        }
        .util-btn:hover {
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
        }
        .util-btn:hover svg {
            color: #c084fc;
        }
        .queue-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .queue-header-actions {
            display: flex;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .queue-action {
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .queue-action:hover {
            color: var(--text-main);
        }
        .queue-action.danger-action:hover {
            color: var(--danger);
        }
        .queue-list-container {
            max-height: 140px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        .queue-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .queue-list-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 2px;
        }
        .queue-list-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        .queue-item {
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        .queue-item.current-item {
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.25);
            color: #d8b4fe;
            font-weight: 600;
        }
        .queue-song-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .queue-status-tag {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #c084fc;
        }
        .playback-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 10px 0;
        }
        .control-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            width: 54px;
            height: 54px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .control-btn svg {
            width: 20px;
            height: 20px;
            transition: all 0.2s ease;
        }
        .control-btn:hover {
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.3);
            color: #c084fc;
            transform: scale(1.06);
        }
        .control-btn:active {
            transform: scale(0.96);
        }
        .control-btn.play-toggle {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
        }
        .control-btn.play-toggle svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }
        .control-btn.play-toggle:hover {
            box-shadow: 0 10px 28px rgba(236, 72, 153, 0.45);
            transform: scale(1.06);
            color: #ffffff;
        }
        .control-btn.play-toggle.playing {
            background: #ffffff;
            color: var(--bg-dark);
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.2);
        }
        .control-btn.play-toggle.playing:hover {
            box-shadow: 0 10px 28px rgba(255, 255, 255, 0.35);
        }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }
        .status-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .status-card-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }
        .status-card-value {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 16px;
            letter-spacing: 0.02em;
        }
        @keyframes spinVinyl {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes dance {
            0% { transform: scaleY(1); }
            100% { transform: scaleY(3.5); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="app-container" id="main-wrapper">
        <div class="header">
            <div class="header-info">
                <h2>ComMSP Controller</h2>
                <div class="status-indicator">
                    <span class="status-dot" id="connection-dot"></span>
                    <span id="system-status">Checking connection...</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-button" onclick="location.reload()" title="Refresh Hub">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                </button>
            </div>
        </div>

        <div class="player-visuals">
            <div class="vinyl-wrapper" id="disc-visual">
                <div class="vinyl-center"></div>
            </div>
            <div class="equalizer" id="equalizer">
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="panel volume-panel">
                <div class="panel-header">
                    <span class="panel-title" onclick="sendCmd('mute')" style="cursor: pointer;">
                        🔊 Master Volume
                    </span>
                    <div class="volume-value-wrapper">
                        <input type="number" id="pc-vol-num" min="0" max="100" value="50" onchange="sendVolume(this.value)" class="volume-input-number">
                        <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-left: 2px;">%</span>
                    </div>
                </div>
                <div class="slider-track-container">
                    <input type="range" id="pc-vol-slider" min="0" max="100" value="50" oninput="document.getElementById('pc-vol-num').value = this.value" onchange="sendVolume(this.value)" class="custom-slider">
                </div>
            </div>

            <div class="panel search-container">
                <span class="panel-title">🎵 Play YouTube Music</span>
                <div class="input-row">
                    <input type="text" id="ytmusic-song-name" placeholder="Enter song title or link..." class="search-input">
                    <button class="primary-action-btn" onclick="playYTMusic()" title="Play Song">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                </div>
                <button onclick="playFavoriteSong()" class="secondary-badge-btn">
                    🎧 Autoplay Favorite Track
                </button>
            </div>

            <div class="panel system-panel">
                <span class="panel-title">🖥️ System Utilities</span>
                <div class="utility-grid">
                    <button class="util-btn" onclick="sendCmd('lock')" title="Lock PC Workstation">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <span>Lock PC</span>
                    </button>
                    <button class="util-btn" onclick="sendCmd('desktop')" title="Toggle Desktop Mode">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        <span>Desktop</span>
                    </button>
                    <button class="util-btn" onclick="sendCmd('openplayer')" title="Launch Fullscreen Jukebox Player">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        <span>Jukebox</span>
                    </button>
                    <button class="util-btn" onclick="sendCmd('calc')" title="Open Calculator">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="18" x2="12" y2="18"/><line x1="8" y1="18" x2="8" y2="18"/></svg>
                        <span>Calc</span>
                    </button>
                </div>
                <div class="input-row" style="margin-top: 8px;">
                    <input type="text" id="pc-search-query" placeholder="Google search on host PC..." class="search-input" style="padding: 8px 12px; font-size: 0.8rem;">
                    <button class="primary-action-btn" onclick="sendSearch()" style="padding: 8px 14px; font-size: 0.8rem;" title="Search">
                        🔍
                    </button>
                </div>
            </div>

            <div class="panel queue-panel" id="queue-container" style="display: none;">
                <div class="panel-header" style="border-bottom: 1px solid rgba(255, 255, 255, 0.04); padding-bottom: 8px; margin-bottom: 4px;">
                    <span class="panel-title" id="queue-title-count">📋 Playback Queue (0)</span>
                    <div class="queue-header-actions">
                        <span onclick="sendCmd('skip')" class="queue-action">Skip</span>
                        <span onclick="sendCmd('clear')" class="queue-action danger-action">Clear</span>
                    </div>
                </div>
                <div id="queue-list" class="queue-list-container"></div>
            </div>

            <div class="playback-controls">
                <button class="control-btn" id="btn-prev" title="Previous Track" onclick="sendCmd('prev')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button class="control-btn play-toggle" id="btn-play" title="Play/Pause" onclick="togglePlay()">
                    <svg id="play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </button>
                <button class="control-btn" id="btn-next" title="Next Track" onclick="sendCmd('next')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <span class="status-card-label">Wi-Fi Signal</span>
                <span class="status-card-value" id="val-wifi">-- dBm</span>
            </div>
            <div class="status-card">
                <span class="status-card-label">Uptime</span>
                <span class="status-card-value" id="val-uptime">--:--:--</span>
            </div>
        </div>

        <div class="footer">
            icexerspace | COMMSP
        </div>
    </div>

    <script>
        let isMusicPlaying = false;
        let isMuted = false;

        const updateQueueUI = (current, queue) => {
            const queueContainer = document.getElementById('queue-container');
            const queueList = document.getElementById('queue-list');
            
            if (!current && queue.length === 0) {
                queueContainer.style.display = 'none';
                return;
            }
            
            queueContainer.style.display = 'flex';
            queueList.innerHTML = '';
            
            if (current) {
                const currentEl = document.createElement('div');
                currentEl.className = "queue-item current-item";
                currentEl.innerHTML = `<span class="queue-song-title">▶ ${current.title}</span><span class="queue-status-tag">Playing</span>`;
                queueList.appendChild(currentEl);
            }
            
            queue.forEach((song, idx) => {
                const songEl = document.createElement('div');
                songEl.className = "queue-item";
                songEl.innerHTML = `<span class="queue-song-title">${idx + 1}. ${song.title}</span>`;
                queueList.appendChild(songEl);
            });
            
            const countEl = document.getElementById('queue-title-count');
            if (countEl) {
                countEl.textContent = `📋 Playback Queue (${queue.length + (current ? 1 : 0)})`;
            }
        };

        const syncPlayUI = (playing) => {
            if (isMusicPlaying === playing) return;
            isMusicPlaying = playing;
            
            const playBtn = document.getElementById('btn-play');
            const disc = document.getElementById('disc-visual');
            const container = document.getElementById('main-wrapper');
            const playIcon = document.getElementById('play-icon');

            if (playing) {
                playBtn.classList.add('playing');
                disc.classList.add('playing');
                container.classList.add('playing');
                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/>';
            } else {
                playBtn.classList.remove('playing');
                disc.classList.remove('playing');
                container.classList.remove('playing');
                playIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
            }
        };

        const fetchStatus = () => {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('val-wifi').textContent = data.wifi + ' dBm';
                    document.getElementById('val-uptime').textContent = data.uptime;
                    
                    const dot = document.getElementById('connection-dot');
                    const text = document.getElementById('system-status');
                    
                    if (data.pc_online) {
                        dot.className = 'status-dot active';
                        text.textContent = 'PC Agent Connected';
                        
                        if (data.volume !== undefined && 
                            document.activeElement !== document.getElementById('pc-vol-slider') &&
                            document.activeElement !== document.getElementById('pc-vol-num')) {
                            document.getElementById('pc-vol-slider').value = data.volume;
                            document.getElementById('pc-vol-num').value = data.volume;
                        }
                    } else {
                        dot.className = 'status-dot';
                        text.textContent = 'PC Agent Offline';
                    }
                })
                .catch(() => {
                    document.getElementById('connection-dot').className = 'status-dot';
                    document.getElementById('system-status').textContent = 'Connection Interrupted';
                });

            fetch('/api/queue/status')
                .then(res => res.json())
                .then(data => {
                    updateQueueUI(data.current, data.queue);
                    syncPlayUI(data.is_playing);
                })
                .catch(err => console.error("Error fetching queue:", err));
        };

        const sendCmd = (cmd) => {
            if (cmd === 'mute') {
                isMuted = !isMuted;
                const muteBtn = document.getElementById('btn-mute');
                if (muteBtn) {
                    if (isMuted) {
                        muteBtn.classList.add('muted');
                    } else {
                        muteBtn.classList.remove('muted');
                    }
                }
            }

            fetch('/api/media?cmd=' + cmd)
                .then(res => res.json())
                .then(data => {
                    console.log('Command ' + cmd + ' executed successfully: ', data);
                })
                .catch(err => console.error('Command execution failed: ', err));
        };

        const sendVolume = (val) => {
            const v = Math.max(0, Math.min(100, parseInt(val) || 0));
            document.getElementById('pc-vol-slider').value = v;
            document.getElementById('pc-vol-num').value = v;
            
            fetch('/api/media?cmd=volume&val=' + v)
                .then(res => res.json())
                .then(data => {
                    console.log('Volume set to ' + v + '% successfully: ', data);
                })
                .catch(err => console.error('Volume control command failed: ', err));
        };

        const sendSearch = () => {
            const queryInput = document.getElementById('pc-search-query');
            const query = queryInput.value.trim();
            if (!query) return;
            
            fetch('/api/media?cmd=search&val=' + encodeURIComponent(query))
                .then(res => res.json())
                .then(data => {
                    console.log('Search initiated on PC: ', data);
                    queryInput.value = '';
                })
                .catch(err => console.error('Failed to initiate search: ', err));
        };

        const togglePlay = () => {
            sendCmd('play');
        };

        const playYTMusic = () => {
            const songInput = document.getElementById('ytmusic-song-name');
            const songName = songInput.value.trim();
            if (!songName) return;

            fetch('/api/media?cmd=ytmusic&song=' + encodeURIComponent(songName))
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        alert("Error: " + data.error);
                    } else {
                        console.log('Successfully launched track ' + songName + ': ', data);
                        songInput.value = '';
                    }
                })
                .catch(err => console.error('Error starting track: ', err));
        };

        const playFavoriteSong = () => {
            const songUrl = 'https://music.youtube.com/watch?v=w_1JT2hLJUU';
            fetch('/api/media?cmd=ytmusic&song=' + encodeURIComponent(songUrl))
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        alert("Error playing favorite track: " + data.error);
                    } else {
                        console.log('Successfully launched favorite track: ', data);
                    }
                })
                .catch(err => console.error('Error starting favorite track: ', err));
        };

        const init = () => {
            fetchStatus();
            setInterval(fetchStatus, 3000);
            
            const ytInput = document.getElementById('ytmusic-song-name');
            if (ytInput) {
                ytInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        playYTMusic();
                    }
                });
            }
            
            const pcSearchInput = document.getElementById('pc-search-query');
            if (pcSearchInput) {
                pcSearchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        sendSearch();
                    }
                });
            }
        };

        init();
    </script>
</body>
</html>
